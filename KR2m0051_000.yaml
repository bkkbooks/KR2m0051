  text: 欽定四庫全書史部十三
  hash: sha256:37715509aef7f3494164bc585a87d8624d4b4517ea757749fe3b4d88b8516ad7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0051_WYG_000-1a, image: WYG0663/WYG0663-0481a.png}
body:
  text: 補漢兵志政書類四軍政之屬提要臣等謹案補漢兵志一卷宋錢文子撰文子字文季樂清人紹熙三年由上舍釋褐出身以吏部員外郎兼國史院編修官厯宗正少卿後退居白石山下自號白石山人宋初懲五代之弊收天下甲兵悉萃京師謂之禁軍輾轉増益至于八十餘萬而虛名冒濫實無可用之兵南渡以後倉皇補苴招聚彌多而冗費亦彌甚文子以漢承三代之後去古未逺猶有寓兵于農之意而班史無志因摭其本紀列傳及諸志之中載及兵制者裒而編之附以考證論斷以成此書卷首有其門人陳元粹序述其作書之意甚詳盖為宋事立議非為漢書補亡也朱彞尊跋稱其言近而指逺詞約而義該非低頭拱手髙談性命之學者所能然兵農既分以後其勢不可復合必欲強復古制不約以軍律則兵不足恃必約以軍律則兵未練而農先擾故三代以下但可以屯種之法寓農於兵不復以井田之制寓兵於農文子所論所謂言之則成理而試之則不可行者即以宋事而論數十萬之象乆已仰食於官如一旦汰之歸農勢不能靖惟有聚為賊盜耳而以漸而損之則兵未能遽化為農農又未能遽化為兵倉卒有事何以禦之此又明知其弊而不能驟革者也以所論切中宋制之弊而又可補漢志之闕故仍錄之以備參考文獻通考載此書作補漢兵制與此本不同然文子明言班書無兵制則作補兵志審矣通考盖傳寫訛也乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀補漢兵志原序漢兵志永嘉白石先生徃為大都授時所著予少小執經師從曾偹討閲因獲聞纂集之大㫖初藝祖開基次第剗削五代僭偽收其精兵聚於京師天下既平而已聚之兵不可復散遂定都汴京以便漕運始倚兵以固國而不及天下之形勢嘗自嘆曰不出百年天下民力殫矣固已逆知後世以兵為病也然當時徒見兵聚而精不知其後兵聚而不可復用盖自太宗既平太原欲遂取幽燕而不克自是嵗有契丹之擾澶淵之役僅能罷兵為和而西夏之叛終莫得其要領㝷至永樂之衂極為中原之變所在戰卒望風奔潰訖未聞一戰之獲渡江以来稍自振刷和議既成㝷復廢弛數十年来天下無事衣糧犒賞不可少殺生息長養而貪将黠吏得以浸容其奸故老弱者難汰虗籍者難覈安坐無事則驕驕則難用久聚而法弛則悍悍則難制生息繁而衣給有限則貧貧則思亂征行調發之日稀不閑臨陣决戰之術則怯怯則棄甲曵兵而走今自京師禁衛江上諸屯諸州廂禁邉上戍守往徃以百萬為額而未嘗可用也夫以天下不及承平之半而養百萬無用之卒凡今天下嗷嗷行一切之術網羅天下之遺利以竭生民之力而楮幣茶鹽之法日益敝壊皆為此也抑可久而不知變乎於虖此先生所以拳拳有意於漢家之遺制也謹按漢制調民有限無常役之嵗則與今日老弱虗籍者異按補兵制首當知用民之目盖漢法民二十始傅二十三為正卒五十六免通為三十六年自始傳為更卒嵗一月止扵三十有六月即今廂軍偹厮役者是為衛士止一嵗即今禁衛扈從者是為材官騎士止一嵗即今禁軍偹戰守者是戍邉三日即今更遣戍卒者是漢之用民止此四條夫以民之為生除其少與老中間三十有六年之間藉其强壮之日而用之又不過両嵗及三十有六月加以戍邉通為五嵗有三日耳其勢老弱虗籍自無所容於其間夫兵不常役則佚而不怨在官之日少則有餘力而不疲故漢兵所向未嘗敗衂横行於四夷而匈奴卒於摧敗破滅欵塞奉國珍来朝闕下近古未嘗有也其與今日常有邊境之憂異矣有事檄召事已罷歸無聚食之費則與今日竭民力以養兵者異按髙帝十年征陳豨上曰吾以羽檄徴天下兵未有至者是年淮南王布反檄諸侯兵上自将以擊布孝武云吾初即位不欲出虎符發兵郡國齊哀王謀發兵中尉魏勃語吕平曰王欲發兵非有漢虎符騐也髙帝紀五年夏五月既誅項羽兵皆罷歸家則知漢法兵皆㪚於郡國有事則以虎符檄召而用之事已皆罷歸家無復養兵之費矣衣齎自偹無供億之勞則與今日春秋衣賜不時給賞者異按賈誼傳曰漢淮南吏民繇役往来長安者自悉而補中道衣敝錢用諸費稱此貨殖傳曰長安中列侯封君行從軍旅齎貸子錢家則知漢兵雖以征行調發衣齎猶自偹而况無事而嵗科和買供給春秋二衣乎近地調發無逺征之勞已詳補志並註不立素将無擁兵專制之虞按唐杜佑通典云兵制可採惟有漢氏或有四夷侵軼則從中命将發五營騎士六郡良家貳師樓船伏波下瀬咸因事立稱畢事則省雖衛霍勲髙績重身奉朝請兵皆㪚歸都試課殿最無驕蹇難用之患已詳補志並註故自文帝以來與民休息經常不耗則減田租弛山澤文帝二年賜天下民田租之半十三年除田租税後元六年弛山澤㝷至太倉之粟陳陳相因都内之錢貫朽而不可挍皆不養兵之效也誠使稍取漢制斟酌劑量恭而行於今日以救其極敝不十年間國力可紓民力可裕其效猶指諸掌夫亦何憚而不為嗟夫先生乃老矣方力疾丐休築室深山中徜徉物外以書史泉石自娱将終身焉此志邈矣顧毎以予講肄滋乆警䇿藴奥粗可與語理道者其素相期待者逺矣然予亦偃蹇半世安於静退未嘗出位而思豈敢輙言兵事而先生憂國之心與所著書要不可不與有志於斯世者共之也雖然其事大體重関繫宏逺要在成順致利不駭民聽其條目次第固非一端初先生更欲編次漢調兵弛役尺籍伍符金皷旗幟及凡兵間調度别為一書未果葢漢兵最近古其規模尤精宻而史闕其文姑採摭羣書先志其大莭而其􅊏悉未能盡載此書也先生名文子字文季世居樂邑白石山下因自號白石山人云嘉定甲戍陳元粹序補漢兵志綱目凡用民見下四項漢法民二十始傅止非調民爲之也更卒更卒曰踐更止雖罷癃不免衞士衞士属衞尉止有加恩焉材官騎士材官騎士屬郡都尉止葢長從募士多而郡國之兵壞矣戍邊天下之人皆直戍邊止漢之用民殆不過此復而天子推恩則有復其身者止無以給中外繇役矣郎所謂天子之衞則光禄勲所領諸郎是也止其郎員悉省於先漢矣南北軍其次則有南軍有北軍止其所領士徒亦甚多矣三輔兵三輔之兵中尉主之止則中尉所專職唯徼循而已城中兵凡城中屬長安令止蓋京師之兵大畧具此滎陽屯兵其外則滎陽屯兵止無常屯之兵也郡國兵郡國之兵則材官騎士是也止非虎符不得輒發邊兵唯當冦之邊特異内郡止蓋其權重矣部都尉部都尉部戍卒乘障塞止不以從征也農都尉農都尉武帝初置止其制邊守塞大畧如此屬國然猶困於匈奴之彊止所謂以蠻夷制蠻夷者也欽定四庫全書補漢兵志并註宋錢文子撰漢法民二十始傅高紀二年蕭何發關中老弱未傅者悉詣軍服䖍曰傅音附孟康曰古者二十而傅三年耕有一年儲故二十三而後役之如淳曰律年二十三傅之疇官各從其父疇學之師古曰傅著也言著名籍給公家徭役也景紀二年令天下男子二十始傅師古曰舊註二十三今二十更爲異制當考本末二十三爲正卒漢儀註民年二十三爲正一歳爲衞士一歳爲材官騎士習射御騎馳戰陣漢舊儀民年二十三爲正一歳爲衞士一歳爲材官騎士水處爲樓舩自始傅爲更卒歳一月正卒爲衞士一歳材官騎士一歳食貨志董仲舒曰秦法月爲更卒已復爲正一歳屯戍一歳力役三十倍於古漢興循而未改師古曰更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歳之中三十倍多於古也昭紀元鳳四年逋更賦勿収如淳曰此漢初因秦法而行之也後遂改易有謫乃戍邊一歳爾案正卒比更卒爲正也更卒給郡縣非正卒仲舒所謂已復爲正謂二十三歳後應爲衞士材官者顔説以爲給中都官者非也給中都官即以衞士分戍中都官耳事見魏相傳循而未改謂更卒歳一月正卒二歳大畧與秦相似耳其實漢人無一歳屯戍一歳力役之事也戍邊歳三日如淳曰天下人皆直戍邊三日律所謂徭戍五十六免漢儀注年五十六衰老乃得免爲庻人就田里至於治城郭築隄防轉輸力役皆官予庸直非調民爲之也惠紀三年發長安六百里内男女十四萬六千人城長安三十日罷發卒十萬救决河食貨志耿夀昌奏言故事歳漕關東榖四百萬斛以給京師用卒六萬人食貨志天子爲伐胡故盛養馬馬之往來食長安者數萬匹卒掌者關中不足乃調旁近郡案食貨志通西南夷道作者數萬人千里負擔餽餉率十餘鍾致一石散幣於卭僰以輯之又築衞朔方轉漕甚遠費數十百鉅萬府庫並虗又溝洫志成帝河平三年治河卒非受平價者爲著外繇六月則知漢人治城郭築隄防轉輸力役皆官予庸直非調民爲之也如養馬至調旁近郡盖更卒歟更卒曰踐更昭紀元鳳四年如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭爲之一月一更是爲卒更也貧者欲得雇更錢次直者出錢雇之月二千是爲踐更也天下人皆直戍邊三日亦名爲更律所謂徭戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便住一歳一更諸不行者出錢三百入官官以給戍者是爲過更也律說卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也案更卒非正卒也人直一月猶踐履而去故踐更踐更即更卒也若雇人爲之當隨其月緩急貴賤爲之直謂之平賈漢錢重不得定爲二千也若不直而入錢於官是爲更賦也秦爵不更不爲更卒左右中更主領更卒百官表爵四不更十二左更十三中更十四右更師古曰不更言不豫更卒之事左右中更主領更卒部其役使也其畨上尉主之昭紀元鳳四年如淳曰尉律卒踐更一月郭解傳解出入皆避有一人獨箕倨視之解乃隂請尉史曰是人吾所重至踐更時脫之毎至直更數過吏弗求怪之問其故解使脫之箕踞者乃肉袒謝罪郡國役使過律若過員皆坐免功臣表信武侯靳亭祝阿侯高成孝文後三年皆坐事國人過律免案過律如滿一月當代而過役之類功臣表東茅侯劉告孝文十六年坐事國人過員免師古曰事謂役使之員數也案過員謂當給郡國者有員數其餘則出更賦過員則更賦减矣其不役而収其直謂之更賦雖罷癃不免昭紀元鳳四年三年以上逋更賦未入者皆勿収後漢書虞詡傳永平章和中州郡以走卒錢給貸貧人王莽下令云漢氏常有更賦罷癃咸出高紀二年如淳曰律高不滿六尺二寸以下爲罷癃案更卒給郡國歳一月不役者官収其庸謂之更賦其輕重未詳唐庸法歳役二旬不役者収其庸日三尺衞士屬衞尉百官表衞尉秦官掌宫門衞屯兵後漢志衞尉掌宫門衞士宫中徼循事髙后紀令平陽侯吿衞尉毋納相國産殿門景武功臣表李夀坐爲衞尉居守擅出長安界送海西侯至高橋又使吏殺人誅霍光傳地節三年徙霍光女壻度遼將軍未央衞尉范明友爲光禄勲徙光女壻長樂衞尉鄧廣漢爲少府及兩宫衞將屯兵悉易以所親信許史子弟代之其寺在宫内漢舊儀衞尉寺在宫内周垣爲區廬衞士分居之百官表胡廣云衞士於周垣下爲區廬區廬者若今之仗宿屋矣元紀初元五年師古曰衞尉有八屯有長樂建章甘泉衞尉不常置百官表長樂建章甘泉衞尉皆掌其宫職畧同不常置高后紀朱虗侯章馳斬長樂衞尉吕更始武五子傳戾太子出武庫兵發長樂宫衞宣紀元平元年太后歸長樂宮初置屯衞案長樂衞尉自漢初有之今云初置者疑戾太子敗後罷之至此方置太初元年起建章宫宣紀元康元年置建章衞尉元紀初元三年罷甘泉建章宫衞令就農衞尉之屬有衞司馬衞候左右都候有公車司馬衞士旅賁令丞百官表屬官有公車司馬衞士旅賁三令丞衞士三丞又諸屯衞候司馬二十二官皆屬焉二十二官未詳司馬候主徼廵宿衞元紀初元五年師古曰衞尉有八屯衞候司馬主衞士徼廵宿衞毎面各二司馬故謂宫之外門爲司馬門元紀初元五年令從官給事宫司馬中者得爲大父母父母兄弟通籍應劭曰司馬主武兵禁之意也籍者爲二尺竹牒記其年紀名字物色縣之宫門案省相應乃得入也後漢志宫掖門毎門司馬一人比千石本注云南宮南屯司馬主平城門北宫門蒼龍司馬主東門𤣥武司馬主𤣥武門北屯司馬主北門北宫朱雀司馬主南掖門東明司馬主東門朔平司馬主北門凡七門凡居宫中者皆有口籍於門之所屬宫名兩字爲鐵印文符案省符乃内之若外人以事當入本宫長史爲封棨傳其有官位出入令御者言其官又胡廣云諸門部各陳屯夾道其旁掌兵以示威武交㦸以遮妄出入者盖寛饒傳初拜爲衞司馬未出殿門斷其禪衣令短離地冠大冠帯長劍躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歳盡交代上臨饗罷衞卒衞卒數十人皆叩頭自請願復留共更一年以報寛饒厚恩元紀初元五年衞司馬谷吉使匈奴鄭吉傳以侍郎遷衞司馬馮奉世傳以衞尉持節送大宛諸國客至伊脩城案左氏春秋晉悼公以祁奚爲中軍尉魏絳爲司馬張老爲候奄盖秦晉間以尉司馬候爲軍官左右都候廵宫中及天子有所収考後漢志左右都候各一人六百石丞各一人本註曰主劍㦸士徼循宫及天子有所収考蔡質漢儀曰宫中諸官有劾奏罪左都候執㦸戲車縛送付詔獄在官小大各付所屬以馬被覆此其識也皆與中尉相表裏漢舊儀宫司馬諸隊都候領督盗賊屬執金吾司馬掖門殿門此衞士皆屬衞尉案百官表中尉屬官無衞司馬候左右都候此云屬金吾者盖執金吾徼廵宫外實相表裏所謂聨事公車司馬令受章奏及徵詣公車者三輔黄圖未央宫四靣皆有公車劉向傳章交公車後漢志公車司馬令一人六百石丞尉各一人掌宫南闕門凡吏民上章四方貢獻及徵詣公車者丞選曉諱掌知非法尉主闕門兵禁戒非常獻帝起居注曰建安八年議郎衞林爲公車司馬令位隨將大夫舊公車令與都官長史位從將大夫自林始衞士令領衞士後漢志南宫衞士令一人六百石丞一人掌南宫衞士北宫衞士令一人六百石丞一人掌北宫衞士旅賁令蓋主衞士之驍勇者以備非常師古曰旅衆也賁與奔同言爲奔走之任也後漢志中興省旅賁令案周官旅賁氏中士二人下士十有六人徒八人掌執戈盾夾王車而趨漢倣此名以衞士爲之中興以公車司馬衞故省之歟凡衞尉太尉所部漢官目錄太僕光禄勲衛尉三卿太尉所部時以領屬衞將軍外戚傳高后八年以梁王爲相國居後軍文紀即日夕入未央宫夜拜宋昌爲衞將軍領南北軍二年始罷衞將軍軍案南軍即衞士張安世傳地節三年罷車騎將軍屯兵更爲衞將軍两宫衞尉城門北軍兵屬焉其轉置送迎常二萬人武紀建元元年詔曰衛士轉置送迎常二萬人其省萬人鄭氏曰去故置新常二萬人漢舊儀饗衞士萬五千人應劭漢官衞尉衞士六十人南宫衛士令衛士五百三十七人北宫衛士令衞士四百七十二人右都候衞士四百一十六人左都候衞士三百八十三人南宫南屯司馬衛士百二人北宫門蒼龍司馬衞士四十人𤣥武司馬衞士三十八人北屯司馬衞士三十八人北宫朱雀司馬衞士百二十四人東明司馬衞士百八十人朔平司馬衞士百一十七人案衞尉所管衞士數諸離宫寢園及中都官不在其中然後漢制度大率減於西京有分戍諸離宫寢園及中都官者韋元成傳昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寢園與諸帝合凡三十所用衞士四萬五千一百二十九人養犧牲卒不在數中魏相傳爲河南太守後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願留作一年以贖太守罪師古曰來京師諸官府爲戍卒若今衞士上畨分守諸司雖時有减省然用民多矣賈山傳陛下即位减外徭衛卒元帝時貢禹言諸離宫及長樂宫衞可減其大半以寛繇役天子下其議省建章甘泉宫衞卒減諸侯王廟衞卒省其半其始至丞相迎勞漢舊儀衞士初至未入君侯到都國外賜勞吏士歳盡罷遣天子臨饗勸以農桑有加恩焉漢舊儀正月五日大置酒饗衛士蓋寛饒傳及歳盡交代上臨饗罷衞卒王尊傳正月行幸曲臺臨饗罷衞士丞相衡與中二千石大鴻臚賞等㑹坐於殿門下後漢志饗遣故衞士儀百官㑹位定謁者持節引故衛士入自端門衛司馬執幡鉦䕶行行定侍御史持節慰勞以詔問所疾苦受其章奏所欲言畢饗賜作樂觀其角抵樂闋罷遣勸以農桑材官騎士刑法志漢興天下旣定踵秦置材官於郡國京師有南北軍之屯漢官儀高祖命天下郡國選能引關蹶張材力武猛者以爲輕車騎士材官樓船屬郡都尉百官表郡尉掌佐守典武職甲卒秩比二千石有丞秩皆六百石景帝中二年更名都尉諸侯王國中尉掌武職以歳八月太守都尉令長丞爲㑹都試水處爲樓船漢舊儀常以八月太守都尉令長丞尉㑹都試材官騎士習騎馳戰陣課殿最水處爲樓船亦習戰射行舩令丞尉亦各統其縣守尉不得專也翟義傳義爲東郡太守王莽居攝義心惡之遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀於是以九月都試日斬觀令因勒其車騎材官大抵金城天水隴西安定北地河東上黨上郡多騎士三河頴川沛郡淮陽汝南巴蜀多材官髙紀十一年淮南王反上乃發上郡北地隴西車騎巴蜀材官及中尉卒三萬人軍霸上武紀元鼎六年發隴西天水安定騎士及中尉河南河内卒十萬人征西𦍑宣紀神爵元年西𦍑反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士詣金城江淮以南多樓舩士武紀元鼎五年南越相呂嘉反遣伏波將軍路博徳出桂陽下湟水樓舩將軍楊僕出豫章下湞水歸義侯嚴為戈舩将軍出零陵下離水甲為下瀨將軍下蒼梧皆將罪人江淮以南樓舩卒十萬人食貨志元鼎五年南越反因南方樓舩士二十餘萬人擊之朱買臣傳東越數反朱買臣為㑹稽太守詔到郡治樓舩備糧食水戰具嚴助傳淮南王上書曰前時南海王反陛下先臣使將軍閒忌將兵擊之㑹天暑多雨樓舩卒水居擊櫂未戰而疾死者過半其興發量地逺近若宣帝以沛郡淮陽汝南征西𦍑蓋罷民矣事見上郡國不擅斥騎士趙廣漢傳坐擅斥除騎士乏軍興數罪腰斬師古曰斥除謂逐遣之非教士不得徴發武五子傳燕王旦賜䇿曰毋乃廢備非教士不得從徴以功推遷得至將相申屠嘉傳以材官蹶張從擊質籍袁盎傳君以材官蹶張遷為隊帥積功至淮陽太守趙充國傳始為騎士以六郡良家子補羽林霍去病傳騎士孟已有功賜爵闗内侯然其試騎士有為伍分左右部置軍假司馬千人㦯至坐死韓延夀傳蕭望之案延夀在東郡時試騎為伍分左右部軍假司馬千人反治飾車甲三百萬以上於是望之劾延夀上僣不道延夀竟坐棄市馮唐傳夫士卒盡家人子起田中從軍安知尺籍伍符而諸侯王不得領庫兵飭武備燕王旦傳旦詐言以武帝時受詔得職吏事修武備備非常於是下令羣臣曰寡人親奉明詔職吏事領庫兵飭武備案諸侯王不得領庫兵盖七國敗後稍禁抑之武帝之後有選募有罪徒其選募曰勇敢武紀天漢四年發天下七科讁及勇敢士遣李廣利等擊匈奴李陵傳將勇敢五千人敎射張掖酒泉以備胡天漢二年召陵使爲貳師將輜重陵自請曰臣所將屯邊者皆荆楚勇士竒材劍客也力扼虎射命中願得自當一隊曰奔命昭紀始元元年遣吕破胡募吏民及發犍爲蜀郡奔命擊益州應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權選取精勇聞命奔走故謂之奔命曰伉健宣紀本始二年大發興調選郡國吏三百石伉健習騎射者皆從軍趙充國傳奏云四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草曰豪吏王温舒傳㑹究軍發詔徵豪吏温舒匿其吏華成及人有變告温舒受貟騎錢它姦利事罪至族自殺曰應募宣紀神爵元年發三輔中都官徒及應募佽飛射士趙充國傳罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者馮奉世傳復發募士萬人拜韓安國爲建威將軍常惠傳家貧自奮應募淮南王傳時有欲從軍者輒詣長安雷被即願奮擊匈奴太子數惡被王使郎中令斥免欲以禁後元朔五年被遂亡之長安上書自明上遣漢中尉宏即訊騐王中尉還以聞公卿治者曰淮南王安壅閼求奮擊匈奴者雷被等格明詔當棄市詔不許曰私從趙充國傳願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者李廣傳負私從者不與其罪徒曰謫民曰惡少武紀太初元年遣李廣利發天下讁民西征大宛武紀天漢四年發天下七科讁及勇敢士遣李廣利將擊匈奴張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科李廣利傳太初元年發屬國六千騎及郡國惡少年數萬人以往又赦囚徒捍冦盗發惡少年及邊騎嵗餘而出又發天下七科謫及載糒給貳師案七科謫張説非也七謫盖擇其罪之輕者凡七科以謫發之其名不詳見武帝雖暴未至如始皇之甚也李廣利傳伐宛罷十一嵗征和三年貳師復出五原擊匈奴無天漢四年擊匈奴事紀傳必有誤昭紀元鳳五年發三輔及郡國惡少年吏有告劾亡者屯遼東曰亡命武紀元封六年益州昆明反赦京師亡命令從軍遣郭昌將以擊之昭紀發吏有告劾之者曰徒曰弛刑昭紀元鳳元年武都氐人反遣馬適建等將三輔太常徒皆免刑擊之宣紀今神爵元年發三輔中都官徒弛刑李竒曰弛廢也謂若徒解鉗􅎂赭衣置任輸作也曰罪人高紀十一年淮南王反上赦天下死罪以下皆令從軍武紀元鼎五年南越相吕嘉反遣路博德楊僕等將罪人江淮以南樓舩十萬人越馳義侯遺别將巴蜀罪人發夜郎兵曰應募罪人武紀元封二年楊僕荀彘將應募罪人擊朝鮮昭紀元鳳六年募郡國徒築遼東𤣥菟城至於中興併尉職罷都試後漢志建武六年省諸郡都尉併職太守無都試之役省闗都尉唯邊郡往往置都尉及屬國都尉稍有分縣治民比郡安帝以羗犯法三輔有陵園之守乃復置右扶風都尉京兆虎牙都尉材官騎士還復民伍世祖紀建武七年三月詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓舩士及軍假吏今還復民伍蓋長從募士多而郡國之兵壞矣馬援傳建武二十四年武陵五溪蠻反援將十二郡募士及弛刑四萬餘人撃之應劭漢官曰自郡國罷材官騎士之後官無警備實啟戎心一方有難三面救之發興雷震烟蒸電激一切取辦黔首囂然不及講其射御用其戒誓一旦驅之以即彊敵是以毎戰常負王旅不振張角懐挾姦僞遐邇揺蕩八州並發烟炎絳天牧守梟裂流血成渠爾乃逺徵三邊殊俗之兵非我族類忿鷙縱横多僵良善以爲己功財貨糞土哀夫民氓遷流之咎見出在兹不敎而戰是謂棄之跡其禍敗豈虛也哉天下之人皆直戍邊謂之過更高紀二年興關中卒乗邊塞婁敬傳敬齊人漢五年戍隴西蓋寛饒傳家貧身爲司𨽻子常歩行自戍北邊後漢安紀永初四年詔三輔除三年逋租過更口算芻藁行者兼代他人一歳而更史記大事記高后五年令戍卒嵗更鼂錯傳今逺方之卒守塞一歳而更不如選常居者如淳曰天下之人皆直戍邊三日亦名爲更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因便住一歳一更諸不行者出錢三百入官以給戍者是謂過更也案過更言三日之戍過之即更猶更卒一月名踐更也案紀除逋租過更錢之逋者非謂出錢入官乃名過更視秦人閭左之戍寛矣陳勝傳發閭左戍漁陽者九百人應劭曰秦時以謫發之名謫戍先發吏有過及贅壻賈人後以嘗有市籍者發又以大父母父母嘗有市籍者戍者曹輩盡復入閭取其左發之未及取右而秦亡邊無事又時減外繇賈山傳陛下即位減外繇衛卒霍去病傳渾邪王降減隴西北地上郡戍卒之半以寛天下繇役宣紀五鳳四年以邊無㓂減戍卒什二昭紀元平元年日者省不急減外繇案史記大事記文十三年除戍卒令諸傳自文帝後但言減之爾未詳或以官奴婢代戍貢禹傳又諸官奴婢十餘萬人戯㳺亡事宜免爲庻人廩食令代關東戍卒乘北邊亭塞候望武帝時始有以謫發者武紀天漢元年發謫戍屯五原食貨志算緡令匿不自占占不􅊖者戍邊一歳戍卒至邊蓋領屬部都尉地理志邊郡有部都尉百官表無之疑領戍卒其賜外繇著外繇者皆計庸直得受之其人也卜式傳賜卜式外繇四百人蘓林曰外繇謂戍邊也一人出錢三百謂之過更式嵗得十二萬錢也溝洫志成帝河平元年治河卒著外繇六月師古曰以卒治河有勞雖執役日近皆得比繇戍六月也著謂著於簿籍也後二嵗河復决治六月乃成治河卒非受平價者為著外繇六月案外繇無六月者外繇嵗不過三日則六月可當六十人今著之俟調發時得受之今庸除已當戍三日它皆爲已有猶卜式傳賜外繇四百人也漢之用民殆不過此而天子推恩則有復其身者若三老髙紀二年舉民年五十以上有修行能率衆為善置以爲三老鄉一人擇鄉三老一人爲縣三老與縣令丞尉以事相敎復勿繇戍若孝弟若力田惠紀四年舉民孝弟力田者復其身若吏卒從軍至平城者高紀八年令吏卒從軍至平城及守城邑者皆復終身勿事若博士弟子儒林傳武帝詔爲博士置弟子五十人復其身若通一經者儒林傳元帝好儒能通一經者皆復若五大夫食貨志鼂錯奏云令民入粟受爵至五大夫以上廼復一人此其與騎馬之功相去逺矣案錯云入粟受爵至五大夫以上廼復一人蓋承舊制爵九級至五大夫廼復耳鄭註周禮鄉大夫貴者皆舍若今宗室及關内侯皆復自後漢改法爵二十級至關内侯乃復也若車騎馬食貨志鼂錯奏云民有車騎馬者復卒三人西域傳武帝詔當令務在禁苛暴止擅賦力本農修馬復令以補闕毋乏武備而已若癃不可事周禮鄉大夫老者疾者皆舍註云疾者謂若今癃不可事者復之漢律民年二十三傅之疇官高不滿六尺二寸以下爲疲癃有復其家若豐沛高紀十二年謂沛父兄其以沛爲朕湯沐邑復其民世世無有所與沛父老爲豐請乃併復豐比沛若吏二千石從入蜀漢者高紀十二年詔云吏二千石入蜀漢定三秦者皆世世復吾扵天下賢士可謂無負矣若軍吏卒非七大夫以下者高紀五年詔軍吏卒非七大夫以下者皆復其身及户勿事若吏六百石及嘗佩將軍都尉印將兵及二千石官印者惠紀詔吏六百石以上父母妻子與同居及故吏嘗佩將軍都尉印將兵及佩二千石官印者家唯給軍賦它毌有所與案軍賦即算賦若民徙塞下者鼂錯傳今令逺方之卒守塞一嵗而更不知胡人之能不如選常居者家室田作且以偹之募民之欲往皆賜高爵復其家賈誼傳今西邊北邊之郡雖有長爵不輕得復案邊郡與西羗匈奴接境雖高爵應復之人亦不免操兵爲守戰備言匈奴為邊郡害如此非漢法不與之復也若宗室文紀四年復諸劉有屬籍者家無所與周禮鄉大夫國中貴者皆舍鄭註云若今宗室及關内侯皆復是也若功臣後宣紀地節二年詔大司馬大將軍博陸侯復其後世疇其爵邑世世無有所與功臣表元康四年復高帝功臣絳侯周勃百三十六人家子孫令奉祭祀世世勿絶其無嗣者復其次案宣紀元康元年表必有誤至於關中卒從軍者高紀二年關中卒從軍者復家一嵗諸侯子在關中者高紀五年詔諸侯子在關中者復之十二嵗其歸者半之流民還歸者宣紀地節三年詔流民還歸者假公田貸種食且勿算事八十九十者子若孫賈山傳九十者一子不事武紀建元元年詔民年九十以上以有受鬻法為復子若孫令得身率妻妾遂其供養之事周禮鄉大夫老者皆舍鄭謂若今八十九十復羡卒民産子者高紀七年詔民産子復勿事二嵗有大父母父母之䘮者復身若家皆有期限宣紀地節四年詔百姓或遭衰絰凶災而吏繇事使不得塟傷孝子之心朕甚憐之自今諸有大父母父母之䘮者勿繇事使得収歛送終盡其子道而復算復租尤不輕予宣紀流民還歸者勿算事高紀二年蜀漢民給軍事勞苦復勿租稅二嵗武帝始令民入粟復食貨志桑𢎞羊請令民入粟甘泉各有差以復終身入奴婢復食貨志兵連不解府庫並虚乃募民入奴婢得以終身復買爵至千夫復而徵發之士益鮮食貨志法旣益嚴吏多廢免兵革數動民多買復及五大夫千夫徵發之士益鮮案秦爵五大夫第九武功爵千夫第七盖武帝創武功爵毎級加舊爵二等欲民貴之故千夫比五大夫皆得復除也無以給中外繇役矣元紀永光三年用度不足民多復除無以給中外繇役所謂天子之衞則光禄勲所領諸郎是也百官表郎中令秦官掌宫殿掖門户有丞武帝太初元年更名光禄勲期門羽林皆屬焉漢舊儀殿外門署屬衞尉殿内郎署屬光禄勲文紀皇帝即日夕入未央宫夜拜張武爲郎中令行殿中楊惲傳擢為諸吏光禄為親近用事居殿中亷潔無私郎官稱公平凡入郎者以吏二千石以上任其子若弟漢儀註吏二千石以上視事滿三年得任同産若子一人為郎哀紀即位除任子令張安世陳咸劉向王崇馮𤣥翟義以父任為郎袁盎霍光楊惲以兄任為郎以明經高相傳子康以明易為郎召信臣傳以明經甲孔科為郎眭𢎞傳從嬴公受春秋以明經為議郎光傳經學尤明年未二十舉為議郎翟方進傳以射策甲科為郎二三嵗舉明經遷議郎劉向傳宣帝初立穀梁春秋召向受穀梁講論五經扵石渠復拜為郎中給事黄門以孝亷董仲舒臣愚以為宜使諸侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衞王吉王駿盖寛饒鮑宣京房韋元成杜鄴師丹馮奉世子譚駿皆以孝亷為郎馮唐以孝亷為郎中署長以射策甲科蕭望之翟方進馬宫何武王嘉皆以射策甲科為郎以博士弟子高第儒林傳武帝時太常奏博士弟子一嵗皆輒課能通一藝以上補文學掌故缺其高第可以爲郎中太常籍奏平帝時増元士之子得受業如弟子嵗課甲科四十人為郎中以上書若賦主父偃傳是時徐樂嚴安亦俱上書言世務上召見拜偃樂安皆為郎中枚乗傳乗子臯召入待詔臯因賦殿中詔使賦平樂館善之拜為郎時使民入羊入奴婢入穀入財或買武功爵皆得補郎郎選衰焉食貨志武帝時府庫空虛迺募民能入奴婢得以終身復為郎増秩及入羊為郎始於此後四年置武功爵以顯軍功多用超等大者封侯卿大夫小者郎吏道雜而多端則官職耗廢及孔僅為大司農始令吏得入穀補官郎至六百石其後所忠又言世家子弟富人或闘雞走狗馬弋獵博戯亂齊民廼徵諸犯令相引數千人名曰株送徒入財者得補郎郎選衰矣卜式傳是時富豪皆争匿財唯式先欲助費上以式終長者乃召拜式為中郎賜爵左庻長田十頃布告天下初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊黄覇傳以待詔入錢賞官補侍郎謁者凡郎有議郎後漢志凡大夫議郎皆掌顧問應對無常事唯詔命所使百官表議郎中郎秩比六百石侍郎比四百石郎中比三百石有中郎東方朔傳復為中郎上為竇太主置酒宣室使謁者引納董偃是時朔辟㦸而前曰董偃有斬罪三安得入上默然曰吾業已設飲後而自改朔曰不可有詔止更置酒北宫引董君從東司馬門有侍郎東方朔傳上以為常侍郎遂得愛幸又設客難曰官不過侍郎位不過執㦸有郎中司馬遷傳為郎中奉使西征巴蜀有外郎惠紀即位賜民爵中郎郎中滿六嵗爵三級四嵗二級外郎滿六嵗二級中郎不滿一嵗一級外郎不滿二嵗賜錢萬蘓林曰外郎㪚郎也按惠帝即位賜爵唯中郎郎中外郎不言議郎侍郎又董仲舒云今長吏多出於中郎郎中吏二千石子弟則知漢初郎官考其實唯有三等諸言郎者外郎也中郎者内郎也郎中者在二郎之中也自武帝後始扵中郎増議郎侍郎非議郎皆更直執㦸宿衛殿門後漢志凡郎皆更直執㦸宿衛殿門出充車騎唯議郎不在直中而内郎守黄門者為黄門郎漢舊儀黄門郎屬黄門令日暮入對青𤨏門名曰夕郎議郎中郎侍郎郎中多至千人百官表議郎中郎侍郎郎中皆無員多至千人而又有期門羽林騎期門亦至千人百官表期門掌執兵送從武帝建元三年初置比郎無員多至千人平帝元始元年更名虎賁郎蔡質漢儀虎賁五百人無常員多至千人或曰三百人漢舊儀期門騎者隴西攻射獵及能用五兵材力三百人羽林七百人百官表羽林掌送從次期門武帝太初元年初置名曰建章營騎後更名羽林騎漢舊儀羽林從官七百人孤兒無數漢舊儀諸孤兒無數或曰羽林郎百一十八人左右騎各八九百人蔡質漢儀羽林郎百一十八人無常貟漢官儀羽林左監主羽林左騎八百人右監主羽林右騎九百人皆以三輔六郡良家子補期門羽林東方朔傳建元三年㣲行始出八月九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號自此始漢舊儀期門騎者隴西攻射獵及能用五兵材力三百人行出㑹待期門下従射獵無員秩比郎従官名曰期門騎地理志武帝選天水隴西安定北地上郡西河凢六郡補羽林以材力為官名将多出焉後漢志羽林郎無員掌宿衛侍従常選漢陽隴西安定北地上郡西河凡六郡良家補夲武帝以便馬從獵還宿殿陛巖下室中故號巖郎漢舊儀羽林從官士百人取三輔良家子自給鞍馬按漢用六郡良家補羽林期門盖三輔園陵頼為藩蔽故取其子弟以偹宿衛猶髙帝封趙壮士四人各千户也天水永平十七年更名漢陽趙充國傳隴西人以六郡良家子善騎射補羽林甘延夀傳北地人少以良家子善騎射為羽林投石拔距絶扵䓁倫嘗超踰羽林亭樓由是遷為郎試弁為期門及從軍死事之子孫養羽林號孤兒父死子代百官表又取從軍死事之子孫養羽林官教以五兵號曰羽林孤兒無數父死子代皆武帝時擊胡死子孫不能自活養羽林官比郎従官從車駕不得冠置令一人名曰羽林騎孤兒常輓大行喪車王莽以卿大夫博士直弟子輓大行䘮車為羽林郎案荀綽晉百官表注曰虎賁諸郎皆父死子代漢制也未詳皆掌執兵送從而羽林又有黄頭郎習櫂船鄧通傳以櫂舩為黄頭郎師古曰刺舩之郎皆著黄帽故號黄頭枚乗傳説吴王曰漢知呉有吞天下之心也遣羽林黄頭循江而下襲大王之都蘇林曰羽林黄頭郎盖習水戰者宣帝發期門羽林從征殆輕用之矣宣紀神爵元年西羗反發三輔中都官徒弛刑及應募佽飛射士羽林孤兒胡越騎三河頴川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士𦍑騎詣金城趙充國傳神爵元年充國子右曺中郎将卬将期門佽飛羽林孤兒胡越騎為支兵案卬所将為支兵即神爵元年所發詣金城者也紀不言發期門誤也馮奉世傳擊西𦍑請益兵乃發三輔河東宏農越騎迹射佽飛彀者羽林孤兒及呼速絫嗕種中郎分五官左右百官表中郎有五官左右三将秩比二千石郎中分車户騎仍有左右百官表郎中有車户騎三将漢儀注郎中令主郎中左右車将主左右車郎左右户将主左右户郎李廣傳景帝初為騎郎将蓋寛饒傳遷諫大夫行郎中户将事劾奏張安世子不下殿門楊惲傳召户将尊欲令戒飭富平侯與期門羽林皆有将百官表中郎有五官左右三将秩皆比二千石郎中有車户騎三将秩皆比千石期門平帝元始元年更名虎賁郎置中郎将秩比二千石宣帝令中郎将騎都尉監羽林秩比二千石後漢志虎賁中郎将比二千石主虎賁宿衛羽林中郎将比二千石主羽林郎光祿勲以嵗時科第其行能元紀永光元年詔丞相御史舉質樸淳厚遜譲有行者光祿勲嵗以此科第郎從官後漢志光祿勲考其徳行而進退之大将軍肄習射御戰陣武五子傳将軍都郎羽林道上稱蹕師古曰都大也謂大㑹試之漢光禄挈令諸當試者不㑹都所免之霍光傳言光出都肄郎羽林師古曰謂緫閲試習武備也将以兵法部屬之袁盎傳為中郎將上曰將軍怯耶案中郎將稱將軍則部屬諸郎當以兵法猶周官諸子奏免其有罪而薦舉其髙第者張釋之傳為騎郎十年不得調欲免歸中郎将袁盎知其賢惜其去乃請徙釋之補謁者楊惲傳遷中郎将謁者有罪遇輙奏免薦舉其髙第有行能者至郡守九卿郎官化之莫不自厲絶請謁貨賂之端令行禁止宫殿之内翕然同聲中興以五官左右虎賁郎将併将中郎侍郎郎中後漢志五官中郎将主五官郎左中郎将主左署郎右中郎将主右署郎虎賁中郎将主虎賁宿衛皆有中郎侍郎郎中羽林中郎将主羽林郎而廢車户騎三将後漢志省車户騎凡三将其郎貟悉省於先漢矣百官表謁者貟七十人後漢志謁者三十人案後漢制度大率省約以謁者推之大率可見也其次則有南軍有北軍南軍則衛士是也外戚傳髙后八年以梁王産為相國居南軍以趙王吕祿為上将軍居北軍臨崩戒祿産曰今王吕氏大臣不平我即崩恐其為變必據兵衛宫謹毋送䘮為人所制髙后紀勃将北軍然尚有南軍丞相平召朱虗侯章佐勃勃令章監軍門令平陽侯告衛尉毋納相國産殿門産不知祿已去北軍入未央宫欲為亂殿門不納徘徊往来平陽侯馳語太尉勃勃未敢誦言誅之也乃謂朱虗侯章曰急入宫衛帝章從勃請卒千人入未央宫掖門見産廷中逐産殺之郎中府吏舍厠中勃曰所患獨産今已誅天下定矣案外戚傳及夲紀考祿産本末則南軍當是衛士以其在北軍之南故謂南軍盖漢初未有他兵也是嵗衛尉營陵侯劉澤北軍在未央北為軍壘垣置中壘校尉以一校守之百官表中壘校尉掌北軍壘門内并屯騎䓁凡八校尉皆武帝初置刑法志漢興天下初定踵秦置材官於郡國京師有南北軍之屯至武帝平百粤内増七校外有樓船晉灼曰凡八校尉胡騎不常置故云七校案漢初有南北軍則中壘校尉掌北軍壘門當是髙帝所置諸吕反太尉不得入北軍則中壘校尉所守也武帝所置自屯騎以下凡七校尉百官表以八校尉皆武帝所置誤矣北軍當在未央北中壘盖中北軍而屯也漢制每一校少者七百人多者千二百人有事屯兵其中事已輙罷文紀皇帝即日夕入未央宫夜拜宋昌為衛将軍領南北軍二年詔曰朕既不能逺德故􅍀然念外人之有非是以設備未息今縱不能罷邉屯戍又飭兵厚衛其罷衛将軍黄覇傳守京兆尹發騎士詣北軍馬不適士劾乏軍興武帝時有諸校尉則常屯矣胡建傳監軍御史與䕶軍諸校列坐堂皇上北軍有監軍御史胡建傳監軍御史穿北軍壘垣以為賈區或曰監北軍使者劉屈氂傳征和二年戻太子召監北軍使者任安發北軍兵安受節閉軍門不肯應太子金日磾傳莽何羅與通及少弟安成矯制夜出殺使者發兵案監北軍使者與監軍御史職號略同自天漢後更名有䕶軍都尉皆監其軍察舉非法陳平傳拜平為都尉使驂乗典䕶軍諸将盡讙曰大王一日得楚之士卒未知其髙下即與同載使監䕶長者或譛平曰今大王尊官之令臣聞平使諸将金多者得善處金少者得惡處平反覆亂臣也漢王召譲平平對云云漢王乃謝厚賜平拜以為䕶軍中尉盡䕶諸将自初從至天下定後常以䕶軍中尉從百官表䕶軍都尉秦官平帝元始元年更名䕶軍都尉衛青傳元朔五年青将六将軍擊匈奴還帝詔御史曰䕶軍都尉公孫敖三從大将軍撃匈奴常䕶軍傅校獲王案䕶軍不屬大将軍師公孫敖從青擊匈奴故傅諸校傅音附有軍正正丞掌軍法百官表髙帝五年軍正陽咸延為少府昭紀始元五年大鴻臚田廣明軍正王平擊益州衛青傳軍正閎長史安李廣利傳擊大宛還詔曰軍正趙始成功最多為光祿大夫胡建傳孝武天漢中守軍正丞時監軍御史為姦穿北軍壘垣以為賈區建欲誅之乃約其走卒曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監軍御史與䕶軍諸校列坐堂皇上建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監軍御史曰取彼走卒前曵下堂皇建曰斬之遂斬御史䕶軍諸校皆愕驚不知所以建亦已有成奏在其懐中遂上奏曰臣聞軍法止武以威衆誅悪以禁邪今監軍御史公穿軍垣以求賈利私買賣以與士市不立剛毅之心勇猛之莭無以率先士大夫尤失理不公用文吏議不至重法黄帝李法曰壁壘已定穿窬不繇路是謂姦人姦人者殺臣謹案軍法曰正無屬将軍将軍有罪以聞二千石以下行法焉丞於用法疑執事不諉上臣謹斬以聞案史記司馬穣苴傳監軍荘賈後至穰苴召軍正問曰軍法期而後至者云何對曰當斬遂斬荘賈以狥葢軍正古官主軍法者非有事不統於太尉諸将軍髙后紀太尉欲入北軍不得入胡建傳軍法曰正無屬將軍而䕶軍之屬大司馬自武帝始也百官表䕶軍都尉武帝元狩四年屬大司馬成帝綏和元年居大司馬府北司直趙充國傳昭帝時武都氐人反充國以大将軍䕶軍䕶軍都尉撃定之又充國為後将軍擊西羗豪靡忘自歸充國遣還諭種人䕶軍以下皆争之王莾傳大司馬䕶軍亷褒奏言安漢公云云武帝增置七校曰屯騎曰歩兵曰越騎曰長水曰胡騎曰射聲曰虎賁百官表屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎長水校尉掌長水宣曲胡騎又有胡騎校尉掌池陽胡騎不常置射聲校尉掌射聲士虎賁校尉掌輕車皆武帝初置有丞司馬校尉秩皆二千石刑法志武帝平百粤内増七校外有樓船晉灼曰百官表凡八校尉云七校者胡騎不常置按胡騎雖云不常置而自武宣後屢見諸傳至光武始併長水豈得不在數中所謂七校者葢中壘係北軍非武帝初置自屯騎而下為七校也各掌其兵以備宿衛三輔黄圖漢有長水中壘虎賁越騎歩兵射聲胡騎宿衛王宫周廬直宿後漢志屯騎越騎歩兵長水射聲校尉皆亦掌宿衛兵葢選募精勇及胡越内附之人比之期門羽林無復更代而京師始有長從坐食之兵矣有事時發五校或胡越騎李陵傳貳師将軍伐大宛使陵將五校兵随後趙充國傳子卬將期門佽飛羽林孤兒胡越騎為支兵元紀永光二年馮奉世撃西羗任千秋别將五校並進奉世復請益兵乃發三輔河東宏農越騎迹射佽飛彀者羽林孤兒而越騎尤重率以所親信領之金日磾傳金敞子渉領三輔胡越騎師古曰胡越騎之在三輔者若長水長楊宣曲之屬是也霍光傳兄孫山奉車都尉侍中領胡越兵光薨帝封山為樂平侯以奉車都尉領尚書事諸領胡越兵悉易以所親信許史子弟代中興省中壘以胡騎虎賁并長水射聲而置北軍中候以監五營後漢光武紀建武七年省長水射聲二校尉官九年置青巾左校尉官十五年復置屯騎長水射聲三校尉官改青巾左校尉為越騎校尉是也後漢志中興省中壘但置中候以監五營胡騎并長水虎賁主䡖車並射聲始謂五校為北軍吴漢傳漢薨發北軍五校䡖車介士送𦵏案霍光傳發材官輕車北軍五校士軍陳至茂陵謂北軍及五校也東都省中壘無北軍中候營遂通謂五校為北軍而胡越騎或以他軍充之其名則猶故也後漢志越騎校尉如淳曰越人内附以為騎也晉灼曰取其材力超越也案光武改青巾左校尉為越騎校尉臣昭曰越人非善騎所出晉灼為允案刑法志武帝平百粤増七校又諸傳多言胡越騎則胡越非超越明矣葢光武以他軍充越騎其官則仍舊名也至於少府有佽飛百官表少府屬官有左弋居室令丞武帝太初元年更名佽飛佽飛掌弋射有九丞兩尉臣瓉曰官有一令九丞在上林苑中結繒繳弋鳬鴈嵗萬頭以供祀宗廟如淳曰吕氏春秋荆有兹非得寳劍於干將渡江中流兩蛟繞舟兹非㧞寳劍赴江刺兩蛟而殺之荆王聞之仕以執圭後世以為勇力之官兹佽音相近師古曰亦因取其便利輕疾若飛故號佽飛水衡有輯濯百官表水衡都尉属官有輯濯令丞如淳曰輯濯船官也師古曰輯與楫同音集濯直孝反皆所以行船也武帝以後時備興發其所領士徒亦甚多矣宣紀神爵元年發三輔中都官徒弛刑及應募佽飛射士詣金城趙充國傳子中郎将卬将期門佽飛孤兒胡越騎為支兵劉屈氂傳征和二年戾太子反屈氂矯制發輯濯士以與大鴻臚商邱成是也三輔之兵中尉主之中尉掌宫外戒司非常水火之事百官表中尉秦官掌徼循京師武帝太初元年更名執金吾秩中二千石後漢志執金吾一人秩中二千石掌中外戒司非常水火之事月三繞行宫外及主兵器常以緹騎二百人廵京師漢官曰執金吾緹騎二百人五百二十人輿服道從光滿道路世祖嘆曰仕宦當作執金吾與衛尉相表裏胡廣曰衛尉廵行宫中則金吾徼於外相為表裏擒姦討猾其督捕姦盗則官司馬都候屬焉漢舊儀官司馬諸隊都候領督盗賊屬執金吾案百官表衛候司馬及左右都候皆屬衛尉葢領督盗賊之事則以屬中尉歟有大事發兵屯衛事已輙罷髙紀十一年淮南王反上乃發上郡北地隴西車騎巴蜀材官及中尉卒三萬人為皇太子衛軍覇上文紀三年上幸甘泉發中尉材官屬衛将軍軍長安其征伐四夷不輕用也武紀元鼎六年發隴西天水安定騎士及中尉河南河内卒十萬人遣將軍李息郎中令徐自為征西羗其官有兩丞司馬候千人又中壘寺互武庫都船及式道左右中候皆屬焉百官表有兩丞候司馬千人屬官有中壘寺互武庫都船四令丞都船武庫有三丞中壘兩尉又式道左右中候候丞左右京輔都尉尉丞兵卒皆屬焉初寺互屬少府中屬主爵後屬中尉武帝置左右京輔都尉分掌三輔而屬之中尉則中尉所事職唯徼循而已百官表元鼎四年置三輔都尉都尉丞各一人凡城中屬長安令有左右尉其外有廣部明部尉凡四尉漢舊儀長安城中皆屬長安令置左右尉城南城東置廣部尉城西城北置明部尉凡四尉自戾太子敗乃置城門校尉掌城門屯兵武紀征和二年太子亡初置城門屯兵有司馬十二城門候百官表城門校尉秩二千石掌京師城門屯兵有司馬十二城門候師古曰八屯各有司馬門各有候蕭望之署小苑東門候其後以近臣領之張安世傳罷車騎将軍屯兵更為衛將軍兩宫衛尉城門北軍兵屬焉至開幕府如將軍外戚元后傳王音代鳯為大司馬車騎将軍而平阿侯譚位特進領城門兵譲不受後上悔廢平阿侯譚不輔政而薨也乃復進成都侯商以特進領城門兵置幕府得舉吏如将軍商代音為大司馬衛將軍而紅陽侯立位特進領城門兵而函谷關亦置關都尉屯兵守之葢京師之兵大畧具此百官表關都尉秦官武帝初置魏相傳大将軍霍光責過相曰㓜主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令其外則滎陽屯兵臨事輙發無常屯之兵也髙紀十二年帝崩吕后與審食其謀曰諸将故與帝為編户民北面為臣心常鞅鞅今乃事少主非盡族是天下不安酈商見審食其曰誠如此天下危矣陳平灌嬰将十萬守滎陽樊噲周勃将二十萬定燕代比聞帝崩諸將皆誅必連兵還向以攻關中陳平傳平恐吕后及吕嬃怒乃馳傳先去逄使者詔平與灌嬰屯滎陽平受詔立復馳至宫惠紀七年發車騎材官詣滎陽太尉灌嬰将髙后紀八年崩上将軍祿相國産顓兵秉政因謀作亂齊悼惠王子朱虗侯章在京師欲與太尉勃丞相平為内應以誅諸吕齊王遂發兵祿産等遣大将軍灌嬰將兵撃之嬰至滎陽使人諭齊王與連和待吕氏變而共誅之文紀三年濟北王興居聞帝之代欲自撃匈奴乃反發兵欲襲滎陽於是詔罷丞相兵以柴武為大将軍将十萬衆撃之祁侯繒賀為将軍軍滎陽吴王濞傳七國反天子遣曲周侯酈寄擊趙将軍欒布撃齊大将軍竇嬰屯滎陽監齊趙兵郡國之兵則材官騎士是也漢創秦故始令天下縣邑城髙紀六年令天下縣邑城而材官騎士嵗時講肄然其給事郡國唯更卒衛士而材官騎士非虎符不得輙發齊悼惠王傳哀王謀發兵中尉魏勃紿召平曰王欲發兵非有漢虎符騐也唯當㓂之邉特異内郡自漢初置諸侯王髙紀五年立番君芮為長沙王立盧綰為燕王六年立兄宜信侯喜為代王以太原郡三十一縣為韓國徙韓王信都晉陽七年廢代王喜立子如意為代王九年廢趙王敖徙代王如意為趙王諸侯王表諸侯比境周帀三垂外接胡越以信臣監邉盧綰傳陳豨以郎中封為列侯以趙相國将監趙代邉兵韓信傳陳豨為代相監邉辭信信挈其手曰公之所居天下精兵處也而公陛下之信幸臣也案髙紀九年廢趙王敖徙代王如意為趙王葢豨始為代相及如意王趙復為趙相故二傳不同耳兵精地大隨即叛亡髙紀六年韓王信降匈奴十年代相國陳豨反上曰豨嘗為吾使甚有信代地吾所急故封豨為列侯以相國守代十二年陳豨降将言豨反時燕王盧綰使人之豨所隂謀上使審食其迎綰綰稱疾食其言綰反有端使樊噲周勃将兵撃綰詔曰燕王綰與吾有故愛之如子聞與陳豨有謀吾以為亡有故使人迎綰綰稱疾不来謀反明矣其後徙代地置雲中髙紀十一年上擊陳豨還雒陽詔曰代地居常山之北與夷狄為隣趙乃從山南有之逺數有胡㓂難以為國頗取山南太原之地益屬代代之雲中以西為雲中郡則代受邊㓂益少矣而長沙燕代皆割其南北邊為郡諸侯王表長沙燕代雖有舊名皆事南北邊矣如淳曰長沙之南更置郡燕代以北更置縁邊郡其所有饒利兵馬噐械三國皆失之也既又募民徙塞下為築室屋復其家不輸賦鼂錯傳錯上言今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣纔至則胡又已去聚而不罷為費甚大罷之則胡又入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令逺方之卒守塞一嵗而更不知胡人之䏻不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠荅復為一城其内城間百五十歩要害之處通川之道調立城邑毋下千家為中周虎落先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足廼募民之欲徃者皆賜髙爵復其家予冬夏衣廪食能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民利祿不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之縣官為贖其民如是則邑里相救助赴胡不避死非以徳上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使逺方無屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨於民相去逺矣上從其言募民徙塞下錯復言陛下幸募民以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壮士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸徃矣臣聞古之徙逺方以實廣虛也相其隂陽之和甞其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二内門户之閉置器物焉民至有所居作有所用此民之所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相䘏墳墓相從種樹畜長室家完安所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里為連連有假五百十連一邑邑有假候皆擇其賢材有䕶習地形知民心者居則習民於射法出則教民於應敵故卒伍成於内則軍政定於外服習以成勿令遷徙㓜則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣不給衛士材官漢官儀邊郡不又給衛士材官以令徙姦猾吏民於邊以扞㓂虜武紀元狩五年徙天下姦猾吏民於邊有征伐則將其兵以從將軍朱買臣傳上拜買臣為㑹稽太守受詔將兵與横海將軍韓說等俱擊破東越趙充國傳虜絶轉道詔將八校尉與驍騎都尉金城太守合虜充國計欲以威信招降罕开及刼畧者時疏捕山間上已發云云與武威張掖酒泉太守各屯其郡者合六萬人矣又云上即拜酒泉太守辛武賢為破羗將軍將兵六千一百人燉煌太守快將二千人昭紀元鳳三年遼東烏桓反以中郎將范明友為度遼將軍將北邊七郡郡二千騎擊之雖髙爵得復然不能不興發也賈誼傳令西邊北邊之郡雖有長爵不輕得復五尺以下不輕得息太守將萬騎行障塞漢舊儀邊郡太守將萬騎行障塞治亭徼食貨志上北出蕭闗行獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下案上下文當是元鼎中紀下書置長史司馬候千人盖其權重矣漢舊儀邊郡太守置長史一人丞一人治兵民當兵行長史領置部都尉千人司馬候農都尉皆不治民百官表邊郡守又有長史掌兵馬秩六百石後漢志郡置太守一人丞一人郡當邊戌者丞為長史王國之相亦如之馮奉世傳馮譚以孝廉為郎補天水司馬嚴助傳發兵㑹稽㑹稽守欲距法不為發助乃斬一司馬諭意指部都尉部戍卒乗障塞有東西部或南北部皆因秦故隨地要害稍損益之地理志朔方五原雲中定㐮代郡遼東有東西中部都尉酒泉有東西北部都尉鴈門上谷遼西有東西部都尉㑹稽有南西部都尉隴西樂浪有南部都尉北地武威廣漢上郡有北部都尉西河有南西北部都尉燉煌有中部都尉案百官表有長史典兵馬則部都尉葢部戍卒守塞歟乗塞列隧不過數千人趙充國傳充國奏云竊見北邊自燉煌至遼東萬一千五百餘里乗塞列隧有吏卒數千人虜數大衆攻之而不能害有障塞尉各領其土武紀太初三年遣光祿勲徐自為築五原塞外列城西北至盧胊彊弩都尉路博德築居延秋匃奴入定㐮殺掠數千人行壊光祿諸亭障晋灼曰地理志從五原棝陽縣北出石門障即得所築城師古曰漢制毎塞要處别築為城置人鎮守謂之候城此即障也後漢志邊縣有障塞尉掌禁備羗夷犯塞張湯傳博士狄山言湯詐忠於是上作色曰吾使生居一郡䏻無使虜入盗乎山曰不能曰居一縣曰不能復曰居一障間山自度辯窮且下吏曰能廼遣山乗障至月餘匃奴斬山頭而去要以屯衛邊民不以從征也案諸紀傳無戍卒從軍攻戰也農都尉武帝初置領内郡卒屯田塞下因以備虜百官表農都尉武帝置後漢志武帝時置農都尉主屯田殖穀其制邊守塞大略如此然猶困於匃奴之彊毎聞虜入則發兵屯邊公卿大夫罷於奔命逺者至六月輙罷歸周亞夫傳文帝後六年匃奴大入邉以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門河内守周亞夫為將軍軍細栁以備胡月餘三軍皆罷武紀元光元年衛尉李廣為驍騎將軍屯雲中中尉程不識為車騎將軍屯鴈門六月罷二年御史大夫韓安國為䕶軍將軍衛尉李廣為驍騎將軍太僕公孫賀為䡖車將軍大行王恢為將屯將軍太中大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出六月罷武帝後時有將屯之兵矣李陵傳為騎都尉將勇敢五千人教射張掖酒泉以備胡霍去病傳路博徳為彊弩都尉屯居延趙充國傳遷中郎將將屯上谷趙充國傳將四萬騎屯縁邊九郡師古曰九郡盖五原朔方雲中代郡鴈門定襄北平上谷漁陽自征伐之餘夷狄衰耗於是即其歸義者處之塞外為屬國鼂錯傳今降胡義渠蠻夷之屬來歸義者數千飲食長技與匃奴同可賜以堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之武紀元狩二年匃奴昆邪王殺休屠王幷將其衆合四萬人來降置五屬國處之趙充國傳減隴西北地上郡戍卒之半乃分處降者扵邊五郡故塞外而皆在河南因其故俗為屬國宣紀五鳳三年置西河北地屬國以處匃奴降者置屬國都尉領之百官表典屬國掌蠻夷降者武帝元狩三年昆邪王降復増屬國置都尉丞侯千人屬官九譯令地理志天水勇士安定三水上郡龜兹西河羙稷五原蒲澤皆屬國都尉治後漢竇融謂兄弟曰張掖屬國精兵萬騎以備藩衛從征伐趙充國傳發郡騎及屬國胡騎伉健各千倅馬什二就草功臣表昆侯渠復絫以屬國大首渠擊匃奴侯騏侯駒幾以屬國騎擊匃奴捕單于兄侯而西域有都䕶百官表西域都䕶加官宣帝地節二年初置以騎都尉諫大夫使䕶西域三十六國有副校尉秩比二千石丞一人司馬候千人各二人西域傳自伐宛之後西域震懼於是自燉煌西至鹽澤徃徃起亭而輪臺渠犂皆有田卒數百人置使者校尉領護以給使外國者至宣帝時遣衛司馬使䕶鄯善以西數國其後匃奴日逐王叛單于將其衆來降護鄯善以西使者鄭吉迎之乃使吉倂䕶北道故號曰都䕶都䕶督察烏孫康居諸外國動静有變以聞可安輯安輯之可擊擊之都䕶治烏壘城去陽闗二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都䕶治焉陳湯傳遷西域副校尉與甘延夀俱出西域湯矯制發城郭諸國兵車師戊巳校尉屯田吏士漢兵胡兵合四萬餘人攻斬郅支單于車師有戊巳校尉百官表戊巳校尉元帝初元元年置有丞司馬各一人候五人秩比六百石西域傳元帝復置戊巳校尉屯田車師前王庭師古曰甲乙丙丁庚辛壬癸皆有正位惟戊巳寄治今所置校尉亦無常居故取戊巳為名也有戊校尉有巳校尉一說戊巳居中鎮覆四方今所置校尉亦處西域之中撫諸國也案戊巳校尉在車師前王庭非寄治又車師在西域東隣匃奴亦非處西域之中也校尉名戊巳其義未詳監䕶諸國屯田殖穀以絶匃奴羗道所謂以蠻夷制蠻夷者也補漢兵志
